name: quizsensei
services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
      target: runtime
    container_name: quizsensei_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/app/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
      - ./app:/app/app:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizsensei_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    container_name: quizsensei_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quizsensei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizsensei_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quizsensei_db}
    # ports:
    #   - "5432:5432" # Keep exposed if needed for local DB tools, or comment out
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quizsensei} -d ${POSTGRES_DB:-quizsensei_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quizsensei_redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
